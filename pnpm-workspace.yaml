# mion-starters root config.
#
# NOTE: Each starter (nextjs/16, nuxt/4, vue/3) is published as an
# independent `npm create` package and ships its own pnpm-lock.yaml.
# They are intentionally NOT workspace members — including them would
# hoist their dependencies and break the standalone install/publish
# flow expected by end-users.
#
# This file therefore configures only the root package (root tooling:
# vitest, mionlink/mionupdate/pre-publish-test/publish-all scripts).
# Each starter carries its own pnpm-workspace.yaml with the same
# hardening so the supply-chain protections survive `npm create`.

# ── Build-script allowlist ───────────────────────────────
# pnpm 11 blocks every dependency install/postinstall script by default.
# Only the packages listed here may run them. Entries are added as
# validation surfaces blocked scripts that we explicitly trust.
allowBuilds:
  esbuild: true

# ── Lockfile / install integrity ─────────────────────────
preferFrozenLockfile: true
verifyStoreIntegrity: true

# ── Version pinning (no auto-bumps) ──────────────────────
savePrefix: ''
resolutionMode: highest

# ── Supply-chain protection: minimum release age ─────────
# Refuse to install package versions younger than 30 days (43200 minutes).
# @mionjs/* are exempt — first-party packages, integrity controlled
# elsewhere, and a stale gate would defeat the whole point of running
# mionupdate to test the freshest release.
minimumReleaseAge: 43200
minimumReleaseAgeExclude:
  - '@mionjs/client'
  - '@mionjs/core'
  - '@mionjs/devtools'
  - '@mionjs/drizzle'
  - '@mionjs/platform-aws'
  - '@mionjs/platform-bun'
  - '@mionjs/platform-cloudflare'
  - '@mionjs/platform-gcloud'
  - '@mionjs/platform-node'
  - '@mionjs/platform-vercel'
  - '@mionjs/router'
  - '@mionjs/run-types'
  - '@mionjs/type-formats'

# ── Block lifecycle scripts ──────────────────────────────
ignoreScripts: true
sideEffectsCache: false

# ── Block non-registry sources ───────────────────────────
# Stays `false` on disk. mionlink passes
# `--config.allowNonRegistryProtocols=true` to its install only.
allowNonRegistryProtocols: false

# ── Strict peer / hoisting ───────────────────────────────
strictPeerDependencies: true
autoInstallPeers: false
nodeLinker: hoisted
