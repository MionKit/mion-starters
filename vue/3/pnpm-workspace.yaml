# mion starter (Vue 3) — pnpm 11 hardening.
# Shipped with the published create-starter-vue package so end-users
# inherit the same supply-chain protections used in the mion repo.

# ── Build-script allowlist ───────────────────────────────
# pnpm 11 blocks all dependency install/postinstall scripts by default.
# Only entries listed here (set to `true`) are allowed to run.
allowBuilds:
  esbuild: true

# ── Lockfile / install integrity ─────────────────────────
preferFrozenLockfile: true
verifyStoreIntegrity: true

# ── Version pinning (no auto-bumps) ──────────────────────
savePrefix: ''
resolutionMode: highest

# ── Supply-chain protection: minimum release age ─────────
# Refuse to install package versions younger than 30 days (43200 minutes).
# @mionjs/* are exempt — they are first-party packages whose release
# integrity we already control, and pinning them to a 30-day-old version
# would make starter scaffolds permanently lag the framework they
# showcase. External deps remain subject to the age gate.
minimumReleaseAge: 43200
minimumReleaseAgeExclude:
  - '@mionjs/client'
  - '@mionjs/core'
  - '@mionjs/devtools'
  - '@mionjs/drizzle'
  - '@mionjs/platform-aws'
  - '@mionjs/platform-bun'
  - '@mionjs/platform-cloudflare'
  - '@mionjs/platform-gcloud'
  - '@mionjs/platform-node'
  - '@mionjs/platform-vercel'
  - '@mionjs/router'
  - '@mionjs/run-types'
  - '@mionjs/type-formats'
  # Vue ecosystem — published with incomplete `time` metadata on some
  # subpackages, which pnpm 11 treats as a hard install error when
  # minimumReleaseAge is enabled. Add new entries here as they surface.
  - '@vue/compiler-core'
  - '@vue/compiler-dom'
  - '@vue/compiler-sfc'
  - '@vue/compiler-ssr'
  - '@vue/reactivity'
  - '@vue/runtime-core'
  - '@vue/runtime-dom'
  - '@vue/server-renderer'
  - '@vue/shared'

# ── Block lifecycle scripts ──────────────────────────────
ignoreScripts: true
sideEffectsCache: false

# ── Block non-registry sources ───────────────────────────
# Stays `false` on disk. The repo's `mionlink` script passes
# `--config.allowNonRegistryProtocols=true` to pnpm install for its
# command only.
allowNonRegistryProtocols: false

# ── Strict peer / hoisting ───────────────────────────────
strictPeerDependencies: true
autoInstallPeers: false
nodeLinker: hoisted
