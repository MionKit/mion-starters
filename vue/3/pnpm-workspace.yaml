# mion starter (Vue 3) — pnpm 11 hardening.
# Shipped with the published create-starter-vue package so end-users
# inherit the same supply-chain protections used in the mion repo.

# ── Build-script allowlist ───────────────────────────────
# pnpm 11 blocks all dependency install/postinstall scripts by default.
# Only entries listed here (set to `true`) are allowed to run.
allowBuilds:
  esbuild: true

# ── Lockfile / install integrity ─────────────────────────
preferFrozenLockfile: true
verifyStoreIntegrity: true

# ── Version pinning (no auto-bumps) ──────────────────────
savePrefix: ''
resolutionMode: highest

# ── Supply-chain protection: minimum release age ─────────
# Refuse to install package versions younger than 7 days (10080 minutes).
# Applied to future bumps only — lockfile-frozen entries skip the
# check, so the value chiefly governs what NEW deps may resolve to.
# @mionjs/* are exempt — first-party packages whose release integrity
# is controlled at the source repo; gating them would defeat
# `mionupdate` against the freshest release.
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@mionjs/client'
  - '@mionjs/core'
  - '@mionjs/devtools'
  - '@mionjs/drizzle'
  - '@mionjs/platform-aws'
  - '@mionjs/platform-bun'
  - '@mionjs/platform-cloudflare'
  - '@mionjs/platform-gcloud'
  - '@mionjs/platform-node'
  - '@mionjs/platform-vercel'
  - '@mionjs/router'
  - '@mionjs/run-types'
  - '@mionjs/type-formats'

# ── Block lifecycle scripts ──────────────────────────────
ignoreScripts: true
sideEffectsCache: false

# ── Block non-registry sources ───────────────────────────
# Stays `false` on disk. The repo's `mionlink` script passes
# `--config.allowNonRegistryProtocols=true` to pnpm install for its
# command only.
allowNonRegistryProtocols: false

# ── Peer / hoisting ─────────────────────────────────────
# strictPeerDependencies relaxed for application starters: framework
# transitives routinely declare narrow peer ranges that conflict with
# each other. Supply-chain hardening is unaffected.
strictPeerDependencies: false
autoInstallPeers: false
nodeLinker: hoisted
